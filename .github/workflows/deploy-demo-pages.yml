name: Deploy Demo Pages

# TEMPORARY: this workflow no longer builds the client/demo apps. It publishes a
# static redirect to the AWS CloudFront deployment, because the Render.com-hosted
# API this Pages site depended on is being decommissioned. Old links to
# https://finografic.github.io/monorepo-demo/... keep working by bouncing to the
# equivalent path on https://d2h3ihm2ddi3lx.cloudfront.net.
#
# To revert: `git revert` the commit that introduced this redirect, which restores
# the previous build-and-deploy steps (client + all three demo apps against Render/
# App Runner). See docs/process/PORTFOLIO_DEPLOYMENT.md for the full writeup.

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/deploy-demo-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  AWS_FRONTEND_URL: https://d2h3ihm2ddi3lx.cloudfront.net

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build redirect page
        run: |
          mkdir -p pages
          cat > pages/index.html <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=${AWS_FRONTEND_URL}/" />
              <title>monorepo-demo has moved</title>
              <style>
                body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 4rem auto; padding: 0 1rem; color: #1a1a1a; }
                a { color: #0b8797; }
                p.note { color: #666; font-size: 0.9rem; }
              </style>
            </head>
            <body>
              <h1>This demo has moved</h1>
              <p>
                Redirecting to <a id="target" href="${AWS_FRONTEND_URL}/">${AWS_FRONTEND_URL}/</a>&hellip;
              </p>
              <p class="note">
                Temporary redirect: this GitHub Pages site previously called a Render.com-hosted API that
                has since been decommissioned. Update any bookmarks to the AWS-hosted link above.
              </p>
              <script>
                (function () {
                  var base = '/${{ github.event.repository.name }}';
                  var path = window.location.pathname;
                  var suffix = path.indexOf(base) === 0 ? path.slice(base.length) : '/';
                  var target = '${AWS_FRONTEND_URL}' + suffix + window.location.search + window.location.hash;
                  document.getElementById('target').href = target;
                  window.location.replace(target);
                })();
              </script>
            </body>
          </html>
          HTML
          cp pages/index.html pages/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
