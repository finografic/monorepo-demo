name: Deploy Demo Pages

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/deploy-demo-pages.yml'
      - '.moon/**'
      - 'apps/client/**'
      - 'apps/demo-ai-pipeline/**'
      - 'apps/demo-datavis/**'
      - 'apps/demo-xscan/**'
      - 'packages/shared/**'
      - 'packages/ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PAGES_BASE: /${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Configure GitHub Packages registry
        run: |
          npm config set @finografic:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build portfolio landing page
        env:
          VITE_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL }}
          VITE_BASE_PATH: ${{ env.PAGES_BASE }}/
        run: moon run client:build-pages

      - name: Build AI pipeline demo
        env:
          VITE_AUTH_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL }}
          VITE_BASE_PATH: ${{ env.PAGES_BASE }}/demo-ai-pipeline/
        run: moon run demo-ai-pipeline:build-pages

      - name: Build data visualisation demo
        env:
          VITE_AUTH_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL }}
          VITE_BASE_PATH: ${{ env.PAGES_BASE }}/demo-datavis/
        run: moon run demo-datavis:build-pages

      - name: Build xscan demo
        env:
          VITE_AUTH_API_BASE_URL: ${{ vars.DEMO_API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.DEMO_XSCAN_API_BASE_URL || vars.DEMO_API_BASE_URL }}
          VITE_BASE_PATH: ${{ env.PAGES_BASE }}/demo-xscan/
        run: moon run demo-xscan:build-pages

      - name: Assemble Pages artifact
        run: |
          mkdir -p pages/demo-ai-pipeline pages/demo-datavis pages/demo-xscan
          cp -R apps/client/dist/. pages/
          cp -R apps/demo-ai-pipeline/dist/. pages/demo-ai-pipeline/
          cp -R apps/demo-datavis/dist/. pages/demo-datavis/
          cp -R apps/demo-xscan/dist/. pages/demo-xscan/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
