name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install proto
        run: curl -fsSL https://moonrepo.dev/install/proto.sh | bash -s -- --no-profile
        env:
          PROTO_AUTO_INSTALL: true

      - name: Add proto to PATH
        run: echo "$HOME/.proto/bin" >> $GITHUB_PATH

      - name: Install moon + pnpm + node via proto
        run: |
          proto install moon
          proto install pnpm
          proto install node

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          moon run client:typecheck
          moon run server:typecheck
          moon run demo-ai-pipeline:typecheck

      - name: Test
        run: moon run demo-ai-pipeline:test

      - name: Build (best-effort)
        run: |
          moon run demo-ai-pipeline:build || true
