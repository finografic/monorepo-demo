$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

tasks:
  dev:
    command: 'pnpm dev'
    options:
      cache: false
      persistent: true

  build:
    command: 'pnpm build'
    outputs:
      - 'dist'
    deps:
      - '~:typecheck'

  typecheck:
    command: 'pnpm typecheck'

  lint:
    command: 'pnpm lint'

  test:
    command: 'pnpm test'
    outputs:
      - 'coverage'

  clean:
    command: 'pnpm clean'
    options:
      cache: false
