$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'

tasks:
  dev:
    command: 'pnpm dev'
    options:
      cache: false
      persistent: true

  build:
    command: 'pnpm build'
    outputs:
      - 'dist'
    deps:
      - '~:typecheck'

  start:
    command: 'pnpm start'
    options:
      cache: false
      persistent: true

  typecheck:
    command: 'pnpm typecheck'

  lint:
    command: 'pnpm lint'

  lint:fix:
    command: 'pnpm lint:fix'
    options:
      cache: false

  clean:
    command: 'pnpm clean'
    options:
      cache: false
